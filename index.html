<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醬⨉時光小工具</title>
  <link rel="stylesheet" href="shared/style.css">
</head>

<body>

  <script src="shared/header.js"></script>

  <div class="page-container">
    <!-- 公告佈告欄 ─────────────────────────────────────────────
         新增公告時，在 announcements 陣列加入一筆物件，尉需公告即移除。
         對象格式:
           { date: 'YYYY-MM-DD', type: 'info'|'warning'|'success', text: '內容' }
    ───────────────────────────────────────────────── -->
    <div id="announcementArea"></div>
    <div id="toolContainer"></div>
  </div>

  <script>
    /* ======= 公告內容 =======
     * 加入新公告：在 announcements 陣列新増一筆。
     * type: 'info'    → 藍色（一般資訊）
     *       'success' → 綠色（更新完成）
     *       'warning' → 橘色（注意事項）
     * 對象中不需公告時，把陣列清空即可。
     * ========================= */
    const announcements = [
      { date: '2026-04-22', type: 'warning', text: '手癢增添新功能中！體驗期間恐觸發『暫存遺失』事件，填寫大量數據前請先有心理準備 (╯°▽°)╯ ┻┻' },
    ];

    /* 公告變數色相 */
    const annColors = {
      info:    { bg: '#EFF6FF', border: '#BFDBFE', icon: '📢', text: '#1D4ED8' },
      success: { bg: '#F0FDF4', border: '#86EFAC', icon: '✅',       text: '#166534' },
      warning: { bg: '#FFFBEB', border: '#FCD34D', icon: '⚠️',      text: '#92400E' },
    };

    const annArea = document.getElementById('announcementArea');
    if (announcements.length > 0) {
      annArea.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
        ${announcements.map(a => {
          const c = annColors[a.type] || annColors.info;
          return `<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;
                   background:${c.bg};border:1px solid ${c.border};
                   border-radius:10px;font-size:13px;line-height:1.5">
            <span>${c.icon}</span>
            <span style="flex:1;color:${c.text}">${a.text}</span>
            <span style="color:#aaa;white-space:nowrap;font-size:11px">${a.date}</span>
          </div>`;
        }).join('')}
      </div>`;
    }
    /* ===== Tool Registry =====
     * 新增工具：在對應的 category.tools 陣列中新增一個物件
     * 新增類別：在 categories 陣列中新增一個物件，並建立對應的 tools/*.html（參考 tools/_template.html）
     * enabled: false → 工具保留在清單中但不顯示於首頁
     * ======================== */
    const categories = [
      {
        id: 'settings',
        label: '⚙️ 設定中心',
        tools: [
          {
            enabled: true,
            icon: '⚙️',
            iconBg: '#F3F4F6',
            title: '設定中心',
            desc: '統一管理人才、藝人等跨頁面共用資料，各工具頁面自動讀取設定顯示對應顏色標籤',
            href: 'tools/settings.html',
          },
        ],
      },
      {
        id: 'daily',
        label: '日常相關',
        tools: [
          {
            enabled: true,
            icon: '⚖️',
            iconBg: '#FFF3E0',
            title: '作品合作比對器',
            desc: '自動媒合影視與廣告作品，找出誤差最小、組數最多的配對組合',
            href: 'tools/work-matcher.html',
          },
          {
            enabled: true,
            icon: '⚖️',
            iconBg: '#E8F5E9',
            title: '作品合作比對器(記憶版)',
            desc: '我方作品本機儲存，對方作品每次貼上，自動媒合組數最大化的組合',
            href: 'tools/work-matcher-pro.html',
          },
          {
            enabled: true,
            icon: '🛍️',
            iconBg: '#FFF0F5',
            title: '兌換推薦指南',
            desc: '各活動建議兌換項目，依 SSS～B 分級標示兌換優先度，一覽表格快速查找',
            href: 'tools/exchange-guide.html',
          },
        ],
      },
      {
        id: 'farm',
        label: '農田合作社-生產技術研究',
        tools: [
          {
            enabled: true,
            icon: '🌾',
            iconBg: '#EFF6FF',
            title: '農田人才鍛鍊',
            desc: '輸入各技能花費與增加數值，自動標示最優加點項目並提示最佳換點時機',
            href: 'tools/farm-training.html',
          },
          {
            enabled: true,
            icon: '🎭',
            iconBg: '#FFF0F5',
            title: '農田藝人鍛鍊',
            desc: '輸入各項目花費，以擁有藝人數自動計算效益，標示效益最佳前 N 名項目',
            href: 'tools/farm-artist.html',
          },
          {
            enabled: true,
            icon: '🏪',
            iconBg: '#FEF3C7',
            title: '農田店舖研究',
            desc: '輸入各店舖項目的花費與增加數值，自動標示最優加點項目並提示最佳換點時機',
            href: 'tools/farm-income.html',
          },
        ],
      },
      {
        id: 'ranking',
        label: '🏆 榜單代辦清單',
        tools: [
          {
            enabled: true,
            icon: '🏆',
            iconBg: '#FFF8E1',
            title: '人才榜',
            desc: '記錄每期榜單的人才數值，逐一確認強化代辦清單（人才、載具、藝人、房產、背包等）',
            href: 'tools/talent-ranking.html',
          },
          {
            enabled: true,
            icon: '💰',
            iconBg: '#F0FDF4',
            title: '收入榜',
            desc: '記錄每期收入榜成績，逐一確認增益代辦清單（博物館、各鋪子勳章、董事會、人才委派等）',
            href: 'tools/income-ranking.html',
          },
        ],
      },

    ];

    const container = document.getElementById('toolContainer');
    container.innerHTML = categories
      .map(cat => {
        const visibleTools = cat.tools.filter(t => t.enabled);
        if (visibleTools.length === 0) return '';
        return `
  <section class="tool-section">
    <h2 class="section-label">${cat.label}</h2>
    <div class="tool-grid">
      ${visibleTools.map(t => `
        <a class="tool-card" href="${t.href}">
          <div class="card-icon" style="background:${t.iconBg}">${t.icon}</div>
          <div class="card-title">${t.title}</div>
          <div class="card-desc">${t.desc}</div>
          <div class="card-arrow">開啟工具 →</div>
        </a>
      `).join('')}
    </div>
  </section>`;
      })
      .join('');

  </script>
</body>

</html>

<style>
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--blue); cursor: pointer; border: none; background: none; margin-bottom: 20px; }
  .tool-page-header { margin-bottom: 24px; }
  .firebase-link { display: inline-flex; padding: 6px 14px; background: #FFF3E0; color: #E65100; font-size: 13px; border-radius: 8px; text-decoration: none; margin-top: 8px; font-weight: 600; }
  
  .upload-card { background: var(--card); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); margin-bottom: 24px; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; position: relative; }
  .drop-zone.dragover { border-color: var(--blue); background: rgba(0,122,255,0.04); }
  .drop-zone.has-file { border-color: var(--green); background: rgba(52,199,89,0.04); }
  
  .generate-btn { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 12px 32px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px; }
  .generate-btn:disabled { opacity: 0.4; }

  /* 報表表格樣式 */
  .report-area { margin-top: 32px; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box { flex: 1; min-width: 120px; background: #fff; border-radius: 10px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
  table.report { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
  table.report th, table.report td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .num { text-align: right !important; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .bar { height: 8px; border-radius: 4px; }
</style>

<button class="back-btn" onclick="showHome()">
  <svg width="18" height="18" viewBox="0 0 20 20"><path fill="currentColor" d="M12.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L8.414 10l4.293 4.293a1 1 0 010 1.414z"/></svg>
  返回工具總覽
</button>

<div class="tool-page-header">
  <h1>📊 iOS 使用人數表產生器</h1>
  <p style="color:var(--sub)">上傳 Firebase Analytics 匯出的「技術詳情.csv」</p>
  <a class="firebase-link" href="https://analytics.google.com" target="_blank">前往 Firebase Analytics ↗</a>
</div>

<div class="upload-card">
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".csv" id="csvFileInput" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    <div style="font-size:32px; margin-bottom:8px">📁</div>
    <div id="dz-label" style="font-weight:500">拖曳 CSV 到此處或點擊選取</div>
    <div id="fileName" style="color:var(--green); margin-top:8px; display:none; font-weight:bold;"></div>
  </div>
  <button class="generate-btn" id="generateBtn" disabled onclick="handleGenerate()">產生報表</button>
</div>

<div id="reportArea" class="report-area"></div>

<script>
  // 這裡放置此功能的專屬邏輯 (原本的解析程式碼)
  (function() {
    const dz = document.getElementById('dropZone');
    const input = document.getElementById('csvFileInput');
    const btn = document.getElementById('generateBtn');
    const fileNameEl = document.getElementById('fileName');
    let selectedFile = null;

    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        selectedFile = file;
        dz.classList.add('has-file');
        fileNameEl.textContent = `✅ ${file.name}`;
        fileNameEl.style.display = 'block';
        btn.disabled = false;
      }
    });

    // 核心邏輯... (其餘 parseCSV, renderReport 等函數比照原始程式碼)
    window.handleGenerate = function() {
      const reader = new FileReader();
      reader.onload = function(e) {
        // 執行解析與渲染 (簡化演示)
        const content = e.target.result;
        document.getElementById('reportArea').innerHTML = `
          <div class="stat-box">
            <h3>解析成功</h3>
            <p>已成功讀取內容，請依照原邏輯進行數據處理...</p>
          </div>
        `;
        // 此處可完整保留您原本的 parseCSVContent 與 renderReport 邏輯
      };
      reader.readAsText(selectedFile);
    };
  })();
</script>

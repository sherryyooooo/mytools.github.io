<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時光雜貨店作品比對器</title>
  <style>
    /* 1. 核心視覺系統 - 同步 ios-report.html */
    :root {
      --bg-color: #f5f5f7;
      --card-bg: #ffffff;
      --ios-blue: #007AFF;
      --ios-text-main: #1d1d1f;
      --ios-text-sub: #86868b;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      /* 柔和陰影 */
      --radius-lg: 12px;
      /* 同步 upload-card 倒角 */
      --radius-md: 10px;
      --movie-red: #B71C1C;
      --ad-blue: #01579B;
    }

    body {
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    .match-container {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Microsoft JhengHei", sans-serif;
      color: var(--ios-text-main);
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 返回工具總覽 - 完全同步 ios-report.html 樣式 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--ios-blue);
      text-decoration: none;
      font-size: 15px;
      margin-bottom: 20px;
      font-weight: 400;
      cursor: pointer;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    /* 2. 標題、圖示、副標 - 完全同步 ios-report.html */
    .tool-page-header {
      margin-bottom: 30px;
    }

    .tool-page-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-page-header p {
      color: var(--ios-text-sub);
      font-size: 15px;
      margin: 0;
      line-height: 1.4;
    }

    /* 3. <div class="upload-card"> 區塊呈現 (倒角、陰影) */
    .input-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .player-section-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--ios-text-main);
    }

    .box-wrapper {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* 輸入框容器樣式優化 */
    .input-box {
      background: #f5f5f7;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .box-header {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-action-group {
      display: flex;
      gap: 6px;
    }

    .header-m {
      background: #fee2e2;
      color: var(--movie-red);
    }

    .header-a {
      background: #e0f2fe;
      color: var(--ad-blue);
    }

    textarea {
      width: 100%;
      height: 85px;
      border: none;
      padding: 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      background: transparent;
      box-sizing: border-box;
      display: block;
      color: var(--ios-text-main);
    }

    .btn-paste {
      background: rgba(0, 0, 0, 0.05);
      border: none;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      color: #666;
      font-weight: 600;
    }

    /* 調整按鈕容器，確保內容可以撐開 */
    .action-area {
      text-align: center;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      /* 從 center 改為 stretch，讓子元素預設撐滿寬度 */
      gap: 15px;
    }

    /* 4. 產生報表按鈕樣式同步 - 保留橘底橘字 */
    .generate-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
      width: 100%;
      /* 撐滿寬度 */
      background: #FFF3E0;
      /* 橘底 */
      color: #E65100;
      /* 橘字 */
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: none;
      /* 移除光暈陰影 0 2px 8px rgba(230, 81, 0, 0.1); */
      transition: all 0.2s ease;
      box-sizing: border-box;
      /* 確保 padding 不會撐破寬度 */
    }

    .generate-btn:hover {
      background: #FFE0B2;
      transform: translateY(-1px);
      box-shadow: none;
      /* 確保懸停時也沒有光暈 0 4px 12px rgba(230, 81, 0, 0.15); */
    }

    .generate-btn:active {
      transform: translateY(0);
      background: #FFCC80;
      /* 按下時稍微加深顏色，提供點擊反饋 */
    }

    .clear-btn {
      background: transparent;
      color: var(--ios-text-sub);
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      text-decoration: underline;
    }

    /* 表格卡片同步 iOS 樣式 */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .table-card {
      background: #fff;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--card-shadow);
    }

    .table-header {
      padding: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #fafafa;
      padding: 10px;
      font-size: 12px;
      color: var(--ios-text-sub);
      font-weight: 500;
      border-bottom: 1px solid #f2f2f7;
    }

    td {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      border-bottom: 1px solid #f2f2f7;
    }

    .txt-movie {
      color: var(--movie-red);
      font-weight: 700;
    }

    .txt-ad {
      color: var(--ad-blue);
      font-weight: 700;
    }

    .not-matched {
      opacity: 0.15;
    }

    /* 統計區塊 (同步 ios-report 圓角與陰影) */
    .summary-box {
      margin-top: 20px;
      padding: 24px;
      background: #fff;
      box-shadow: var(--card-shadow);
      border-radius: var(--radius-lg);
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .stat-item {
      text-align: center;
      flex: 1;
      min-width: 100px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--ios-text-sub);
      margin-bottom: 4px;
      display: block;
      font-weight: 500;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--ios-text-main);
    }

    /* 誤差數值樣式 */
    .diff-val {
      display: inline-block;
      font-size: 20px;
      padding: 6px 16px;
      border-radius: 8px;
      font-weight: 800;
    }

    .ideal {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .warning {
      background: #FFEBEE;
      color: #C62828;
    }

    .remain-section {
      margin-top: 20px;
      padding: 20px;
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--card-shadow);
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      margin: 2px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag-red {
      background: #fee2e2;
      color: var(--movie-red);
    }

    .tag-blue {
      background: #e0f2fe;
      color: var(--ad-blue);
    }

    @media (max-width: 768px) {

      .player-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="match-container">
    <a class="back-link" onclick="showHome()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      返回工具總覽
    </a>

    <div class="tool-page-header">
      <h1>⚖️ 時光雜貨店作品比對器</h1>
      <p>設定目標誤差於 100 內，自動媒合組數最大化的組合，當作品數量大時可多試幾次查看不同結果</p>
    </div>

    <div class="input-card">
      <div class="player-grid">
        <div class="box-wrapper">
          <div class="player-section-title">對方數據 (Player B)</div>
          <div class="input-box">
            <div class="box-header header-m">
              <span>對方影視 (B Movie)</span>
              <div class="header-action-group">
                <button class="btn-paste" onclick="pasteTo('oppM')">貼上</button>
                <button class="btn-paste" onclick="document.getElementById('oppM').value=''">清空</button>
              </div>
            </div>
            <textarea id="oppM" placeholder="點擊貼上或輸入數值..."></textarea>
          </div>
          <div class="input-box">
            <div class="box-header header-a">
              <span>對方廣告 (B Ad)</span>
              <div class="header-action-group">
                <button class="btn-paste" onclick="pasteTo('oppA')">貼上</button>
                <button class="btn-paste" onclick="document.getElementById('oppA').value=''">清空</button>
              </div>
            </div>
            <textarea id="oppA" placeholder="點擊貼上或輸入數值..."></textarea>
          </div>
        </div>

        <div class="box-wrapper">
          <div class="player-section-title">我的數據 (Player A)</div>
          <div class="input-box">
            <div class="box-header header-m">
              <span>我的影視 (A Movie)</span>
              <div class="header-action-group">
                <button class="btn-paste" onclick="pasteTo('myM')">貼上</button>
                <button class="btn-paste" onclick="document.getElementById('myM').value=''">清空</button>
              </div>
            </div>
            <textarea id="myM" placeholder="點擊貼上或輸入數值..."></textarea>
          </div>
          <div class="input-box">
            <div class="box-header header-a">
              <span>我的廣告 (A Ad)</span>
              <div class="header-action-group">
                <button class="btn-paste" onclick="pasteTo('myA')">貼上</button>
                <button class="btn-paste" onclick="document.getElementById('myA').value=''">清空</button>
              </div>
            </div>
            <textarea id="myA" placeholder="點擊貼上或輸入數值..."></textarea>
          </div>
        </div>
      </div>

      <div class="action-area">
        <button id="matchBtn" class="generate-btn" onclick="prepareMatching()">執行比對</button>
        <button class="clear-btn" onclick="clearAll()">清除所有輸入內容</button>
        <div id="loadingOverlay"
          style="display:none; margin-top: 10px; font-weight: 600; color: #E65100; font-size: 13px;">⚡ 運算中...</div>
      </div>
    </div>

    <div class="result-grid">
      <div class="table-card">
        <div class="table-header" style="background:#fee2e2; color:var(--movie-red);">對方(影) ↔ 我的(廣)</div>
        <table>
          <thead>
            <tr>
              <th>對方影視</th>
              <th>我的廣告</th>
            </tr>
          </thead>
          <tbody id="movieBody"></tbody>
        </table>
      </div>
      <div class="table-card">
        <div class="table-header" style="background:#e0f2fe; color:var(--ad-blue);">對方(廣) ↔ 我的(影)</div>
        <table>
          <thead>
            <tr>
              <th>對方廣告</th>
              <th>我的影視</th>
            </tr>
          </thead>
          <tbody id="adBody"></tbody>
        </table>
      </div>
    </div>

    <div id="summaryArea" class="summary-box" style="display:none;">
      <div class="stat-item">
        <span class="stat-label">配對組數</span>
        <span id="pairCount" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">對方合作總額</span>
        <span id="sumOpp" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">我方合作總額</span>
        <span id="sumMy" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">計算誤差</span>
        <span id="sumDiff" class="diff-val">0</span>
      </div>
    </div>

    <div id="remainArea" class="remain-section" style="display:none;">
      <div id="oppRemain" style="margin-bottom:15px;"></div>
      <div id="myRemain"></div>
    </div>
  </div>

  <script>
    (function () {
      // 介面函數
      window.clearAll = function () {
        if (!confirm('確定要清空嗎？')) return;
        ['oppM', 'oppA', 'myM', 'myA'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('movieBody').innerHTML = '';
        document.getElementById('adBody').innerHTML = '';
        document.getElementById('summaryArea').style.display = 'none';
        document.getElementById('remainArea').style.display = 'none';
      };

      window.pasteTo = async function (id) {
        try {
          const text = await navigator.clipboard.readText();
          document.getElementById(id).value = text.trim().replace(/[\r\n\t\s]+/g, ' ');
        } catch (err) { alert('剪貼簿存取失敗'); }
      };

      window.prepareMatching = function () {
        const btn = document.getElementById('matchBtn');
        const loading = document.getElementById('loadingOverlay');

        // --- 需求 2：執行前先清空畫面 ---
        document.getElementById('movieBody').innerHTML = '';
        document.getElementById('adBody').innerHTML = '';
        document.getElementById('summaryArea').style.display = 'none';
        document.getElementById('remainArea').style.display = 'none';
        // ----------------------------

        btn.disabled = true;
        loading.style.display = 'block';

        setTimeout(() => {
          startMatching();
          btn.disabled = false;
          loading.style.display = 'none';
          // 運算完成後再滾動
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 150);
      };

      // 核心比對邏輯
      function parseInput(id) {
        return document.getElementById(id).value.trim().split(/\s+/)
          .filter(s => s !== "" && !isNaN(s))
          .map((v, i) => ({ id: `${id}_${i}`, val: Number(v), origin: id }));
      }

      function startMatching() {
        const oppM = parseInput('oppM');
        const oppA = parseInput('oppA');
        const myM = parseInput('myM');
        const myA = parseInput('myA');

        let edges = [];
        myM.forEach(a => oppA.forEach(b => {
          if (Math.max(a.val, b.val) / Math.min(a.val, b.val) <= 5) edges.push({ a, b });
        }));
        oppM.forEach(b => myA.forEach(a => {
          if (Math.max(a.val, b.val) / Math.min(a.val, b.val) <= 5) edges.push({ a, b });
        }));

        let best = { pairs: [], error: Infinity, count: 0, score: -1, sumA: 0, sumB: 0 };
        const maxPairs = Math.min(myM.length + myA.length, oppM.length + oppA.length);

        for (let targetCount = maxPairs; targetCount >= 1; targetCount--) {
          if (best.count > targetCount && best.error <= 100) break;
          for (let attempt = 0; attempt < 1000; attempt++) {
            let currentPairs = [];
            let usedIds = new Set();
            let shuffled = [...edges].sort(() => Math.random() - 0.5);
            for (let e of shuffled) {
              if (currentPairs.length < targetCount && !usedIds.has(e.a.id) && !usedIds.has(e.b.id)) {
                currentPairs.push({ ...e });
                usedIds.add(e.a.id);
                usedIds.add(e.b.id);
              }
            }
            if (currentPairs.length < targetCount) continue;

            let sA = currentPairs.reduce((s, p) => s + p.a.val, 0);
            let sB = currentPairs.reduce((s, p) => s + p.b.val, 0);

            // 自動修正誤差優化
            for (let step = 0; step < 100; step++) {
              let diff = sA - sB;
              if (Math.abs(diff) <= 100) break;
              let improved = false;
              let side = (diff > 0) ? 'a' : 'b';
              let pool = (side === 'a') ? [...myM, ...myA] : [...oppM, ...oppA];
              let unused = pool.filter(x => !usedIds.has(x.id));
              for (let p of currentPairs) {
                for (let candidate of unused) {
                  if (candidate.origin !== p[side].origin) continue;
                  let partner = (side === 'a') ? p.b : p.a;
                  if (Math.max(candidate.val, partner.val) / Math.min(candidate.val, partner.val) <= 5) {
                    let newDiff = (side === 'a') ? (sA - p.a.val + candidate.val) - sB : sA - (sB - p.b.val + candidate.val);
                    if (Math.abs(newDiff) < Math.abs(diff)) {
                      if (side === 'a') sA = sA - p.a.val + candidate.val;
                      else sB = sB - p.b.val + candidate.val;
                      usedIds.delete(p[side].id);
                      p[side] = candidate;
                      usedIds.add(candidate.id);
                      improved = true; break;
                    }
                  }
                }
                if (improved) break;
              }
              if (!improved) break;
            }
            let err = Math.abs(sA - sB);
            let score = currentPairs.length * 1000000 + (100000 - err);
            if (err <= 100 && score > best.score) {
              best = { pairs: currentPairs, error: err, count: currentPairs.length, score, sumA: sA, sumB: sB, usedIds };
            }
          }
        }
        render(best, myM, myA, oppM, oppA);
      }

      function render(res, am, aa, bm, ba) {
        const movieBody = document.getElementById('movieBody');
        const adBody = document.getElementById('adBody');
        const myMVal = [], myAVal = [], oppMatched = new Set();

        res.pairs.forEach(p => {
          if (p.a.origin.startsWith('opp')) {
            oppMatched.add(p.a.id);
            if (p.b.origin === 'myM') myMVal.push(p.b.val); else myAVal.push(p.b.val);
          } else {
            oppMatched.add(p.b.id);
            if (p.a.origin === 'myM') myMVal.push(p.a.val); else myAVal.push(p.a.val);
          }
        });
        myMVal.sort((x, y) => y - x); myAVal.sort((x, y) => y - x);

        function fill(body, items, mValues, matchedIds, oc, mc) {
          const sorted = [...items].sort((x, y) => y.val - x.val);
          let idx = 0;
          body.innerHTML = sorted.map(item => {
            const matched = matchedIds.has(item.id);
            return `<tr>
            <td class="${matched ? oc : 'not-matched'}">${item.val.toLocaleString()}</td>
            <td class="${matched ? mc : 'not-matched'}">${matched ? mValues[idx++].toLocaleString() : '---'}</td>
          </tr>`;
          }).join('');
        }

        fill(movieBody, bm, myAVal, oppMatched, 'txt-movie', 'txt-ad');
        fill(adBody, ba, myMVal, oppMatched, 'txt-ad', 'txt-movie');

        document.getElementById('summaryArea').style.display = 'flex';
        document.getElementById('pairCount').innerText = res.count;
        document.getElementById('sumOpp').innerText = res.sumB.toLocaleString();
        document.getElementById('sumMy').innerText = res.sumA.toLocaleString();
        document.getElementById('sumDiff').innerText = res.error.toLocaleString();
        document.getElementById('sumDiff').className = 'diff-val ' + (res.error <= 100 ? 'ideal' : 'warning');

        document.getElementById('remainArea').style.display = 'block';
        const myRem = [...am, ...aa].filter(x => !res.usedIds.has(x.id)).sort((x, y) => y.val - x.val);
        const oppRem = [...bm, ...ba].filter(x => !res.usedIds.has(x.id)).sort((x, y) => y.val - x.val);
        document.getElementById('oppRemain').innerHTML = '<strong>對方剩餘：</strong>' + oppRem.map(v => `<span class="tag ${v.origin === 'oppM' ? 'tag-red' : 'tag-blue'}">${v.val}</span>`).join('');
        document.getElementById('myRemain').innerHTML = '<strong>我方剩餘：</strong>' + myRem.map(v => `<span class="tag ${v.origin === 'myM' ? 'tag-red' : 'tag-blue'}">${v.val}</span>`).join('');
      }
    })();
  </script>

</body>

</html>
